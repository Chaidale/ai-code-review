services:
  server:
    build: ./server
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "5173:5173"
    depends_on:
      - server
    environment:
      - VITE_API_TARGET=http://server:3001
    restart: unless-stopped
