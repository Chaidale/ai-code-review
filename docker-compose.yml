services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_code_review
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_code_review"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    ports:
      - "3001:3001"
    env_file:
      - ./server/.env
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_code_review
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  client:
    build: ./client
    ports:
      - "1111:80"
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres-data:
